<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sub-Department Submitted Applications</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body class="hr-shell">
    <th:block th:replace="~{header/header :: var-sidebar-header('HR', 'Department Request', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0">Submitted Applications</h2>
                        <small class="text-muted"
                               th:text="${applicationDetail.departmentName + ' | ' + applicationDetail.subDepartmentName}">
                            Department | Sub-Department
                        </small>
                    </div>
                    <a class="btn btn-outline-secondary btn-sm"
                       th:href="@{/hr/department-requests/{departmentId}/subdepartments(departmentId=${applicationDetail.departmentId})}">
                        Back to Sub-Departments
                    </a>
                </div>

                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Request ID</th>
                                    <th>Project Name</th>
                                    <th>Project Code</th>
                                    <th>Application Type</th>
                                    <th>Status</th>
                                    <th>Total Estimated Cost</th>
                                    <th>Last Updated</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(applicationDetail.applications)}">
                                    <td colspan="7" class="text-center text-muted">No submitted applications found.</td>
                                </tr>

                                <tr th:each="applicationSummary : ${applicationDetail.applications}">
                                    <td th:text="${applicationSummary.requestId}">DPA-0000</td>
                                    <td th:text="${applicationSummary.projectName}">Project Name</td>
                                    <td th:text="${applicationSummary.projectCode ?: '-'}">-</td>
                                    <td th:text="${applicationSummary.applicationType != null ? #strings.replace(applicationSummary.applicationType.name(), '_', ' ') : '-'}">
                                        -
                                    </td>
                                    <td>
                                        <span class="badge text-bg-primary"
                                              th:text="${applicationSummary.applicationStatus.statusCode + ' - ' + #strings.replace(applicationSummary.applicationStatus.name(), '_', ' ')}">
                                            SUBMITTED_TO_HR
                                        </span>
                                    </td>
                                    <td th:text="${#numbers.formatDecimal(applicationSummary.totalEstimatedCost != null ? applicationSummary.totalEstimatedCost : 0, 1, 'COMMA', 2, 'POINT')}">
                                        0.00
                                    </td>
                                    <td th:text="${applicationSummary.updatedDate != null ? #temporals.format(applicationSummary.updatedDate, 'dd-MMM-yyyy HH:mm') : '-'}">
                                        -
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
