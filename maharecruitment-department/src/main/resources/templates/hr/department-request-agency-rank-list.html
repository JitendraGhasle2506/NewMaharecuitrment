<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Global Agency Rank Overview</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body class="hr-shell">
    <th:block th:replace="~{header/header :: var-sidebar-header('HR', 'Global Agency Rank Overview', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0">Global Agency Rank Overview</h2>
                        <small class="text-muted">Single global rank order used for all recruitment notifications</small>
                    </div>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/hr/department-requests/global-agency-rank-mapping}">
                        Configure Global Rank
                    </a>
                </div>

                <div class="card-body">
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Agency</th>
                                    <th>Email</th>
                                    <th class="text-center">Rank</th>
                                    <th>Assigned On</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr
                                    th:if="${rankMappingListView == null or #lists.isEmpty(rankMappingListView.rankMappings)}">
                                    <td colspan="4" class="text-center text-muted">
                                        No agency rank mapping records found.
                                    </td>
                                </tr>

                                <tr th:each="rankMapping : ${rankMappingListView.rankMappings}">
                                    <td th:text="${rankMapping.agencyName}">Agency Name</td>
                                    <td th:text="${rankMapping.agencyEmail != null ? rankMapping.agencyEmail : '-'}">
                                        agency@example.com
                                    </td>
                                    <td class="text-center" th:text="${rankMapping.rankNumber}">1</td>
                                    <td
                                        th:text="${rankMapping.assignedDate != null ? #temporals.format(rankMapping.assignedDate, 'dd-MMM-yyyy HH:mm') : '-'}">
                                        -
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
