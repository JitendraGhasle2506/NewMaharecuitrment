<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Auditor Queue Applications | Auditor Dashboard</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
    <link rel="stylesheet" th:href="@{/css/hr-department-requests.css}">
</head>

<body class="hr-shell">
    <th:block th:replace="~{header/header :: var-sidebar-header('Auditor', 'Department Audit Request', ~{::section})}">
        <section class="hr-request-container">
            <!-- Header Section -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="dept-info">
                    <div class="dept-icon shadow-sm">
                        <i class="fa-solid fa-list-check"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold text-dark mb-1">Queue Applications</h2>
                        <p class="text-muted small mb-0" th:text="${applicationDetail.departmentName + ' | ' + applicationDetail.subDepartmentName}">
                            Department | Sub-Department
                        </p>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary btn-sm px-3"
                       th:href="@{/auditor/department-requests/{departmentId}/subdepartments(departmentId=${applicationDetail.departmentId})}">
                        <i class="fa fa-arrow-left me-2"></i>Back to Sub-Departments
                    </a>
                </div>
            </div>

            <div class="alert alert-danger shadow-sm border-0" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <!-- Applications Table -->
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-premium align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Request ID</th>
                                <th>Project Name</th>
                                <th>Application Type</th>
                                <th>Status</th>
                                <th class="text-end">Estimated Cost</th>
                                <th class="text-center">Last Updated</th>
                                <th class="pe-4 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(applicationDetail.applications)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-inbox fa-2x mb-2 opacity-25"></i>
                                    <p class="mb-0">No auditor queue applications found.</p>
                                </td>
                            </tr>

                            <tr th:each="applicationSummary : ${applicationDetail.applications}">
                                <td class="ps-4">
                                    <span class="fw-bold text-primary" th:text="${applicationSummary.requestId}">DPA-0000</span>
                                </td>
                                <td>
                                    <div class="fw-semibold text-dark" th:text="${applicationSummary.projectName}">Project Name</div>
                                </td>
                                <td>
                                    <span class="text-muted small" th:text="${applicationSummary.applicationType != null ? #strings.replace(applicationSummary.applicationType.name(), '_', ' ') : '-'}">
                                        -
                                    </span>
                                </td>
                                <td>
                                    <span class="badge badge-premium text-bg-primary"
                                          th:text="${applicationSummary.applicationStatus.statusCode + ' - ' + #strings.replace(applicationSummary.applicationStatus.name(), '_', ' ')}">
                                        HR_APPROVED
                                    </span>
                                </td>
                                <td class="text-end fw-bold text-success">
                                    ₹ <span th:text="${#numbers.formatDecimal(applicationSummary.totalEstimatedCost != null ? applicationSummary.totalEstimatedCost : 0, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                </td>
                                <td class="text-center">
                                    <span class="text-muted small" th:text="${applicationSummary.updatedDate != null ? #temporals.format(applicationSummary.updatedDate, 'dd-MMM-yyyy HH:mm') : '-'}">
                                        -
                                    </span>
                                </td>
                                <td class="pe-4 text-end">
                                    <a th:href="@{/auditor/department-requests/{departmentId}/subdepartments/{subDepartmentId}/applications/{applicationId}(
                                            departmentId=${applicationDetail.departmentId},
                                            subDepartmentId=${applicationDetail.subDepartmentId},
                                            applicationId=${applicationSummary.departmentProjectApplicationId})}"
                                       class="btn btn-light btn-sm rounded-pill px-3 fw-bold border text-primary">
                                        Audit Review <i class="fa-solid fa-chevron-right ms-1 small"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
