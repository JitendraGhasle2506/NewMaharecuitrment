<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Department Manpower Applications</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body class="department-shell">
    <th:block th:replace="~{header/header :: var-sidebar-header('Department', 'Manpower Applications', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2 class="mb-0">Department Project Manpower Applications</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/department/manpower/apply}">New Application</a>
                </div>
                <div class="card-body">
                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Request ID</th>
                                    <th>Project Name</th>
                                    <th>Application Type</th>
                                    <th>Status</th>
                                    <th>Total Estimated Cost</th>
                                    <th>Last Updated</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(applications)}">
                                    <td colspan="7" class="text-center text-muted">No applications found.</td>
                                </tr>
                                <tr th:each="applicationSummary : ${applications}">
                                    <td th:text="${applicationSummary.requestId}">DPA-20260310-ABC123</td>
                                    <td th:text="${applicationSummary.projectName}">Project Name</td>
                                    <td
                                        th:text="${#strings.replace(applicationSummary.applicationType.name(), '_', ' ')}">
                                        APPLICATION TYPE</td>
                                    <td>
                                        <span class="badge" th:classappend="${
                                                applicationSummary.applicationStatus.name() == 'COMPLETED' ? ' text-bg-success' :
                                                (applicationSummary.applicationStatus.name() == 'HR_REJECTED' ? ' text-bg-danger' :
                                                (applicationSummary.applicationStatus.name() == 'HR_SENT_BACK' || applicationSummary.applicationStatus.name() == 'AUDITOR_SENT_BACK' ? ' text-bg-warning' :
                                                (applicationSummary.applicationStatus.name() == 'DRAFT' ? ' text-bg-secondary' : ' text-bg-primary')))
                                              }"
                                            th:text="${applicationSummary.applicationStatus.statusCode + ' - ' + applicationSummary.applicationStatus.displayName}">
                                            DRAFT
                                        </span>
                                    </td>
                                    <td
                                        th:text="${#numbers.formatDecimal(applicationSummary.totalEstimatedCost != null ? applicationSummary.totalEstimatedCost : 0, 1, 'COMMA', 2, 'POINT')}">
                                        0.00</td>
                                    <td
                                        th:text="${applicationSummary.updatedDate != null ? #temporals.format(applicationSummary.updatedDate, 'dd-MMM-yyyy HH:mm') : '-'}">
                                        -</td>
                                    <td>
                                        <a class="btn btn-outline-primary btn-sm mb-1"
                                            th:href="@{/department/manpower/{id}/edit(id=${applicationSummary.departmentProjectApplicationId})}">
                                            View / Edit
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
