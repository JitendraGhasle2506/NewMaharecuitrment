<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Advance Payment Detail</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body class="department-shell">
    <th:block
        th:replace="~{header/header :: var-sidebar-header('Advance Payment', 'Advance Payment Detail', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2 class="mb-0">Advance Payment Detail</h2>
                    <a th:href="@{/department/payment/list}" class="btn btn-secondary btn-sm">
                        &#8592; Back to List
                    </a>
                </div>

                <div class="card-body">
                    <!-- Project Details Section -->
                    <div class="mb-4" th:if="${projectApp != null}">
                        <h5 class="section-title mb-3"
                            style="color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px;">Project Details
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="text-muted small d-block">Request ID</label>
                                <strong th:text="${projectApp.requestId}"></strong>
                            </div>
                            <div class="col-md-5">
                                <label class="text-muted small d-block">Project Name</label>
                                <strong th:text="${projectApp.projectName}"></strong>
                            </div>
                            <div class="col-md-2">
                                <label class="text-muted small d-block">Project Code</label>
                                <strong th:text="${projectApp.projectCode}"></strong>
                            </div>
                            <div class="col-md-2">
                                <label class="text-muted small d-block">Current Status</label>
                                <span class="badge text-bg-info" th:if="${projectApp.applicationStatus != null}"
                                    th:text="${projectApp.applicationStatus.statusCode + ' - ' + #strings.replace(projectApp.applicationStatus.name(), '_', ' ')}"></span>
                                <span th:if="${projectApp.applicationStatus == null}">-</span>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/department/payment/save}" th:object="${paymentForm}" method="post"
                        enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{departmentProjectApplicationId}" />
                        <input type="hidden" th:field="*{departmentRegistrationId}" />

                        <div class="row g-3 mb-4 p-3 bg-light rounded-3" th:if="${paymentForm.piNumber != null}">
                            <div class="col-md-3">
                                <label class="text-muted small d-block">PI Number</label>
                                <strong th:text="${paymentForm.piNumber}"></strong>
                            </div>
                            <div class="col-md-3">
                                <label class="text-muted small d-block">Total PI Amount</label>
                                <strong
                                    th:text="${'₹' + #numbers.formatDecimal(paymentForm.totalPiAmount, 1, 'COMMA', 2, 'POINT')}"></strong>
                            </div>
                            <div class="col-md-3">
                                <label class="text-muted small d-block">Partially Paid</label>
                                <strong class="text-warning"
                                    th:text="${'₹' + #numbers.formatDecimal(paymentForm.partialAmount, 1, 'COMMA', 2, 'POINT')}"></strong>
                            </div>
                            <div class="col-md-3">
                                <label class="text-muted small d-block">Balance Amount</label>
                                <strong class="text-danger"
                                    th:text="${'₹' + #numbers.formatDecimal(paymentForm.balanceAmount, 1, 'COMMA', 2, 'POINT')}"></strong>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Proforma Invoice <span
                                        class="text-danger small">(Selected)</span></label>
                                <input type="text" th:field="*{proformaInvoiceId}" class="form-control" readonly />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">UTR / Transaction ID <span
                                        class="text-danger">*</span></label>
                                <input type="text" th:field="*{utrNumber}" class="form-control"
                                    placeholder="Enter UTR / Transaction Number" required />
                                <div class="text-danger small" th:if="${#fields.hasErrors('utrNumber')}"
                                    th:errors="*{utrNumber}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold d-block">
                                    Payment Type <span class="text-danger">*</span>
                                </label>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentType" id="fullPay"
                                        value="FULL" th:field="*{paymentType}" checked>
                                    <label class="form-check-label" for="fullPay">
                                        Full Payment (Balance)
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentType" id="partialPay"
                                        value="PARTIAL" th:field="*{paymentType}">
                                    <label class="form-check-label" for="partialPay">
                                        Partial Payment
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Amount to Pay (INR) <span
                                        class="text-danger">*</span></label>
                                <input type="number" step="0.01" th:field="*{totalAmount}" class="form-control"
                                    placeholder="0.00" required id="amountToPay" />
                                <div class="text-danger small" th:if="${#fields.hasErrors('totalAmount')}"
                                    th:errors="*{totalAmount}"></div>
                                <small id="amountWarning" class="text-danger" style="display:none;">Amount cannot exceed
                                    balance!</small>
                            </div>

                            <!-- Live Remaining Balance -->
                            <div class="col-md-6 d-flex align-items-end" id="remainingBalanceBox">
                                <div class="w-100 p-3 rounded-3 border bg-light text-center">
                                    <div class="text-muted small mb-1">Remaining Balance After This Payment</div>
                                    <span id="remainingBalance" class="fw-bold fs-5 text-warning">&#8377;0.00</span>
                                </div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Proof of Payment (Receipt Copy) <span
                                        class="text-danger">*</span></label>
                                <input type="file" th:field="*{receiptFile}" class="form-control"
                                    th:required="${paymentForm.id == null}" />
                                <small class="text-muted" th:if="${paymentForm.receiptOriginalName != null}">Current:
                                    <span th:text="${paymentForm.receiptOriginalName}"></span>
                                    <a th:href="@{/department/payment/{id}/receipt(id=${paymentForm.id})}"
                                        target="_blank" class="ms-1 text-decoration-none">
                                        <i class="fas fa-external-link-alt"></i> View
                                    </a>
                                </small>
                                <div class="text-danger small" th:if="${#fields.hasErrors('receiptFile')}"
                                    th:errors="*{receiptFile}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Remarks</label>
                                <textarea th:field="*{remarks}" class="form-control" rows="3"
                                    placeholder="Additional details..."></textarea>
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-center gap-3"
                            th:if="${paymentForm.id == null or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).DRAFT or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).HR_SENT_BACK or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).AUDITOR_SENT_BACK}">
                            <button type="submit" name="actionStatus" value="save" class="btn btn-outline-info px-4">
                                <i class="fas fa-save me-1"></i> Save as Draft
                            </button>
                            <button type="submit" name="actionStatus" value="send" class="btn btn-primary px-4">
                                <i class="fas fa-paper-plane me-1"></i> Submit for Verification
                            </button>
                        </div>
                        <div class="mt-4 text-center"
                            th:unless="${paymentForm.id == null or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).DRAFT or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).HR_SENT_BACK or paymentForm.applicationStatus == T(com.maharecruitment.gov.in.department.entity.DepartmentApplicationStatus).AUDITOR_SENT_BACK}">
                            <div class="alert alert-info d-inline-block">
                                <i class="fas fa-info-circle me-1"></i> This record has been submitted and is currently
                                in review. It cannot be modified.
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <script th:inline="javascript">
                document.addEventListener('DOMContentLoaded', () => {
                    const balance = /*[[${paymentForm.balanceAmount}]]*/ 0;
                    const amountInput = document.getElementById('amountToPay');
                    const fullPayRadio = document.getElementById('fullPay');
                    const partialPayRadio = document.getElementById('partialPay');
                    const warning = document.getElementById('amountWarning');

                    function updateRemainingBalance(paidAmount) {
                        const remaining = document.getElementById('remainingBalance');
                        if (!remaining) return;
                        const diff = balance - (parseFloat(paidAmount) || 0);
                        remaining.textContent = '\u20b9' + (diff < 0 ? '0.00' : diff.toFixed(2));
                        if (diff <= 0) {
                            remaining.className = 'fw-bold fs-5 text-success';
                        } else if (diff < balance) {
                            remaining.className = 'fw-bold fs-5 text-warning';
                        } else {
                            remaining.className = 'fw-bold fs-5 text-muted';
                        }
                    }

                    function updateAmount() {
                        if (fullPayRadio.checked) {
                            amountInput.value = balance.toFixed(2);
                            amountInput.readOnly = true;
                            warning.style.display = 'none';
                            amountInput.classList.remove('is-invalid');
                            updateRemainingBalance(balance);
                        } else {
                            amountInput.readOnly = false;
                            amountInput.value = '';
                            amountInput.placeholder = 'Enter partial amount...';
                            amountInput.focus();
                            updateRemainingBalance(0);
                        }
                    }

                    fullPayRadio.addEventListener('change', updateAmount);
                    partialPayRadio.addEventListener('change', updateAmount);

                    amountInput.addEventListener('input', () => {
                        const val = parseFloat(amountInput.value) || 0;
                        if (val > balance) {
                            warning.style.display = 'block';
                            amountInput.classList.add('is-invalid');
                        } else {
                            warning.style.display = 'none';
                            amountInput.classList.remove('is-invalid');
                        }
                        updateRemainingBalance(val);
                    });

                    // Initial call
                    updateAmount();
                });
            </script>
        </section>
    </th:block>
</body>

</html>
