<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Project Name</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body class="department-shell">
    <th:block th:replace="~{header/header :: var-sidebar-header('Department', 'Project Name', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0">Project Name</h2>
                        <small class="text-muted">Submitted candidates by project for department shortlisting</small>
                    </div>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/department/home}">Back to Home</a>
                </div>

                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Request ID</th>
                                    <th>Project Name</th>
                                    <th class="text-end">Submitted Candidates</th>
                                    <th class="text-end">Pending Review</th>
                                    <th class="text-end">Shortlisted</th>
                                    <th class="text-end">Rejected</th>
                                    <th>Last Submitted At</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(projectQueue)}">
                                    <td colspan="8" class="text-center text-muted">
                                        No submitted candidates available for shortlisting.
                                    </td>
                                </tr>

                                <tr th:each="project : ${projectQueue}">
                                    <td th:text="${project.requestId}">REQ-0000</td>
                                    <td th:text="${project.projectName != null ? project.projectName : '-'}">Project</td>
                                    <td class="text-end" th:text="${project.totalCandidates != null ? project.totalCandidates : 0}">
                                        0
                                    </td>
                                    <td class="text-end" th:text="${project.pendingCandidates != null ? project.pendingCandidates : 0}">
                                        0
                                    </td>
                                    <td class="text-end" th:text="${project.shortlistedCandidates != null ? project.shortlistedCandidates : 0}">
                                        0
                                    </td>
                                    <td class="text-end" th:text="${project.rejectedCandidates != null ? project.rejectedCandidates : 0}">
                                        0
                                    </td>
                                    <td th:text="${project.latestSubmittedAt != null ? #temporals.format(project.latestSubmittedAt, 'dd-MMM-yyyy HH:mm') : '-'}">
                                        -
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                           th:href="@{/department/candidate-shortlisting/projects/{recruitmentNotificationId}/candidates(
                                            recruitmentNotificationId=${project.recruitmentNotificationId})}">
                                            View Candidates
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
