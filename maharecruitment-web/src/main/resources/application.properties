spring.application.name=maharecruitment-parent
server.port=8777

spring.profiles.active=uat

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update


server.servlet.context-path=/MahaitRecruitment

# Disable Thymeleaf cache (optional)
spring.thymeleaf.cache=false


# Maximum file size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Tomcat connector-level POST body limit (must be >= max-request-size, default is 2MB)
server.tomcat.max-http-form-post-size=50MB
# Compatibility key used by some Tomcat/Spring Boot combinations.
server.tomcat.max-http-post-size=50MB
# Tomcat 4 defaults that commonly reject larger multipart forms.
server.tomcat.max-swallow-size=50MB
server.tomcat.max-part-count=200

logging.level.com.fasterxml.jackson=DEBUG
logging.level.org.springframework.transaction=DEBUG

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


# =========================
# SMS Gateway Configuration
# =========================
