<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Agency Profile</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Agency', 'Profile', ~{::section})}">
        <section>
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Agency Profile</h5>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/agency/dashboard}">
                        Back to Dashboard
                    </a>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted mb-1">Name</label>
                            <div class="fw-semibold" th:text="${profileName}">Agency User</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted mb-1">Email</label>
                            <div class="fw-semibold" th:text="${profileEmail}">agency@example.com</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted mb-1">Mobile</label>
                            <div class="fw-semibold" th:text="${profileMobile}">-</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted mb-1">Roles</label>
                            <div>
                                <span class="badge text-bg-primary me-1" th:each="role : ${profileRoles}"
                                    th:text="${role}">ROLE_AGENCY</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
