<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Menu Management</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Menu Management', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Menu Management</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/admin/menus/new}">Add Menu</a>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>URL</th>
                                    <th>Status</th>
                                    <th>Roles</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${menus.isEmpty()}">
                                    <td colspan="7" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="menu : ${menus.content}">
                                    <td th:text="${menu.menuId}"></td>
                                    <td th:text="${menu.menuNameEnglish}"></td>
                                    <td>
                                        <span class="badge text-bg-light border"
                                            th:text="${menu.isSubMenu == 0} ? 'Parent Menu' : 'Direct Link'"></span>
                                    </td>
                                    <td th:text="${menu.url != null ? menu.url : '-'}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${menu.isActive == 'Y'} ? ' text-bg-success' : ' text-bg-secondary'"
                                            th:text="${menu.isActive == 'Y'} ? 'Active' : 'Inactive'"></span>
                                    </td>
                                    <td>
                                        <span th:if="${menu.roles == null or menu.roles.isEmpty()}" class="text-muted">-</span>
                                        <span th:each="role : ${menu.roles}" class="badge text-bg-light border me-1 mb-1"
                                            th:text="${role.name}"></span>
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/admin/menus/{id}/edit(id=${menu.menuId})}">Edit</a>
                                        <form class="d-inline" th:action="@{/admin/menus/{id}/delete(id=${menu.menuId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('Delete this menu?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${menus.totalPages > 1}"
                        th:with="middleStart=${menus.number - 2 > 1 ? menus.number - 2 : 1},
                                 middleEnd=${menus.number + 2 < menus.totalPages - 2 ? menus.number + 2 : menus.totalPages - 2},
                                 showingFrom=${menus.totalElements == 0 ? 0 : menus.number * menus.size + 1},
                                 showingTo=${menus.totalElements == 0 ? 0 : menus.number * menus.size + menus.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${menus.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${menus.number + 1}">1</span> of <span th:text="${menus.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="Menu management pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${menus.first} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/menus(page=${menus.number - 1},size=${menus.size})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${menus.number == 0} ? ' active'">
                                    <a class="page-link" th:href="@{/admin/menus(page=0,size=${menus.size})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == menus.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/admin/menus(page=${pageIndex},size=${menus.size})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < menus.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${menus.totalPages > 1}"
                                    th:classappend="${menus.number == menus.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/admin/menus(page=${menus.totalPages - 1},size=${menus.size})}"
                                        th:text="${menus.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${menus.last} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/menus(page=${menus.number + 1},size=${menus.size})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
