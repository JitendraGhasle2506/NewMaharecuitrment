<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Menu' : 'Create Menu'">Menu Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Menu Management', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Menu' : 'Create Menu'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${menuForm}"
                        th:action="${isEdit} ? @{/admin/menus/{id}(id=${menuId})} : @{/admin/menus}"
                        method="post" class="row g-3" id="menuForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Menu Name (English)</label>
                            <input type="text" class="form-control" th:field="*{menuNameEnglish}" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('menuNameEnglish')}" th:errors="*{menuNameEnglish}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Menu Name (Marathi)</label>
                            <input type="text" class="form-control" th:field="*{menuNameMarathi}" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('menuNameMarathi')}" th:errors="*{menuNameMarathi}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Menu Type</label>
                            <select class="form-select" th:field="*{isSubMenu}" id="menuType">
                                <option th:value="${menuTypeParent}">Parent Menu (has submenus)</option>
                                <option th:value="${menuTypeDirect}">Direct Link</option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('isSubMenu')}" th:errors="*{isSubMenu}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Icon</label>
                            <input type="text" class="form-control" th:field="*{icon}" maxlength="100"
                                placeholder="fa fa-layer-group" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('icon')}" th:errors="*{icon}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{isActive}">
                                <option value="Y">Active</option>
                                <option value="N">Inactive</option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('isActive')}" th:errors="*{isActive}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">URL</label>
                            <input type="text" class="form-control" th:field="*{url}" id="menuUrl" maxlength="255"
                                placeholder="/admin/menus" autocomplete="off">
                            <small class="text-muted">Required for direct-link menu type.</small>
                            <div class="text-danger small" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Mapped Roles</label>
                            <select class="form-select" multiple th:field="*{roleIds}">
                                <option th:each="role : ${availableRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                            </select>
                            <small class="text-muted">Hold Ctrl to select multiple roles.</small>
                            <div class="text-danger small" th:if="${#fields.hasErrors('roleIds')}" th:errors="*{roleIds}"></div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update Menu' : 'Save Menu'"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/menus}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>

    <script>
        (() => {
            const menuType = document.getElementById('menuType');
            const menuUrl = document.getElementById('menuUrl');
            if (!menuType || !menuUrl) return;

            const updateUrlState = () => {
                const isDirect = menuType.value === '1';
                menuUrl.disabled = !isDirect;
                if (!isDirect) {
                    menuUrl.value = '';
                }
            };

            menuType.addEventListener('change', updateUrlState);
            updateUrlState();
        })();
    </script>
</body>

</html>
