<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Role Menu Mapping' : 'Create Role Menu Mapping'">Role Menu Mapping Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Role Menu Mapping', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Role Menu Mapping' : 'Create Role Menu Mapping'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${mappingForm}"
                        th:action="${isEdit} ? @{/admin/role-menu-mappings/{id}(id=${mappingForm.roleId})} : @{/admin/role-menu-mappings}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Role</label>
                            <select class="form-select" th:field="*{roleId}" th:disabled="${isEdit}">
                                <option th:value="''">-- Select Role --</option>
                                <option th:each="role : ${availableRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                            </select>
                            <input th:if="${isEdit}" type="hidden" th:field="*{roleId}">
                            <div class="text-danger small" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Menus</label>
                            <select class="form-select" multiple th:field="*{menuIds}">
                                <option th:each="menu : ${availableMenus}" th:value="${menu.menuId}"
                                    th:text="${menu.menuNameEnglish + (menu.url != null ? ' (' + menu.url + ')' : '')}"></option>
                            </select>
                            <small class="text-muted">Hold Ctrl to select multiple menus.</small>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update Mapping' : 'Save Mapping'"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/role-menu-mappings}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
