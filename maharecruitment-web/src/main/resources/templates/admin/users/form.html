<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit User' : 'Create User'">User Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Users', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit User' : 'Create User'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${userForm}"
                        th:action="${isEdit} ? @{/admin/users/{id}(id=${userId})} : @{/admin/users}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" th:field="*{name}" class="form-control" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" maxlength="255" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" th:field="*{mobileNo}" class="form-control" maxlength="15" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('mobileNo')}" th:errors="*{mobileNo}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" th:text="${isEdit} ? 'Password (leave blank to keep unchanged)' : 'Password'"></label>
                            <input type="password" th:field="*{password}" class="form-control" maxlength="100" autocomplete="new-password">
                            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Roles</label>
                            <select class="form-select" multiple th:field="*{roleIds}">
                                <option th:each="role : ${availableRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                            </select>
                            <small class="text-muted">Hold Ctrl to select multiple roles.</small>
                            <div class="text-danger small" th:if="${#fields.hasErrors('roleIds')}" th:errors="*{roleIds}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Department (Optional)</label>
                            <select class="form-select" th:field="*{departmentRegistrationId}">
                                <option th:value="''">-- Select Department --</option>
                                <option th:each="dept : ${departments}" th:value="${dept.departmentRegistrationId}"
                                    th:text="${dept.departmentName}"></option>
                            </select>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update' : 'Save'"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
