<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Users', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>User Management</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/admin/users/new}">Add User</a>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Mobile</th>
                                    <th>Roles</th>
                                    <th>Department</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${users.isEmpty()}">
                                    <td colspan="7" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="user : ${users.content}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.name}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td th:text="${user.mobileNo} ?: '-'"></td>
                                    <td>
                                        <span th:if="${user.roles == null or user.roles.isEmpty()}" class="text-muted">-</span>
                                        <span th:each="role : ${user.roles}" class="badge text-bg-light border me-1 mb-1"
                                            th:text="${role.name}"></span>
                                    </td>
                                    <td th:text="${user.departmentRegistrationId != null ? user.departmentRegistrationId.departmentName : '-'}"></td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/admin/users/{id}/edit(id=${user.id})}">Edit</a>
                                        <form class="d-inline"
                                            th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('Delete this user?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${users.totalPages > 1}"
                        th:with="middleStart=${users.number - 2 > 1 ? users.number - 2 : 1},
                                 middleEnd=${users.number + 2 < users.totalPages - 2 ? users.number + 2 : users.totalPages - 2},
                                 showingFrom=${users.totalElements == 0 ? 0 : users.number * users.size + 1},
                                 showingTo=${users.totalElements == 0 ? 0 : users.number * users.size + users.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${users.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${users.number + 1}">1</span> of <span th:text="${users.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="User management pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${users.first} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/users(page=${users.number - 1},size=${users.size})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${users.number == 0} ? ' active'">
                                    <a class="page-link" th:href="@{/admin/users(page=0,size=${users.size})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == users.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/admin/users(page=${pageIndex},size=${users.size})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < users.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${users.totalPages > 1}"
                                    th:classappend="${users.number == users.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/admin/users(page=${users.totalPages - 1},size=${users.size})}"
                                        th:text="${users.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${users.last} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/users(page=${users.number + 1},size=${users.size})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
