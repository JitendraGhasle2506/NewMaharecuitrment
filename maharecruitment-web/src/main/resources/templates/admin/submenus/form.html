 <!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Submenu' : 'Create Submenu'">Submenu Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Submenu Management', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Submenu' : 'Create Submenu'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${subMenuForm}"
                        th:action="${isEdit} ? @{/admin/submenus/{id}(id=${subMenuId})} : @{/admin/submenus}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Parent Menu <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{menuId}">
                                <option th:value="''">-- Select Parent Menu --</option>
                                <option th:each="menu : ${parentMenus}" th:value="${menu.menuId}" th:text="${menu.menuNameEnglish}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('menuId')}" th:errors="*{menuId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Submenu Name (English) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{subMenuNameEnglish}" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('subMenuNameEnglish')}" th:errors="*{subMenuNameEnglish}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Submenu Name (Marathi)</label>
                            <input type="text" class="form-control" th:field="*{subMenuNameMarathi}" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('subMenuNameMarathi')}" th:errors="*{subMenuNameMarathi}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Controller Name</label>
                            <input type="text" class="form-control" th:field="*{controllerName}" maxlength="150" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('controllerName')}" th:errors="*{controllerName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">URL <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{url}" maxlength="255" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Icon</label>
                            <input type="text" class="form-control" th:field="*{icon}" maxlength="100"
                                placeholder="fa fa-link" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('icon')}" th:errors="*{icon}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{isActive}">
                                <option value="Y">Active</option>
                                <option value="N">Inactive</option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('isActive')}" th:errors="*{isActive}"></div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update Submenu' : 'Save Submenu'"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/submenus}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
