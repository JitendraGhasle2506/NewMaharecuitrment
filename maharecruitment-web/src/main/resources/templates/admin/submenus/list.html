<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Submenu Management</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Submenu Management', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Submenu Management</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/admin/submenus/new}">Add Submenu</a>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Parent Menu</th>
                                    <th>Name</th>
                                    <th>URL</th>
                                    <th>Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${subMenus.isEmpty()}">
                                    <td colspan="6" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="subMenu : ${subMenus.content}">
                                    <td th:text="${subMenu.subMenuId}"></td>
                                    <td th:text="${subMenu.menu != null ? subMenu.menu.menuNameEnglish : '-'}"></td>
                                    <td th:text="${subMenu.subMenuNameEnglish}"></td>
                                    <td th:text="${subMenu.url}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${subMenu.isActive == 'Y'} ? ' text-bg-success' : ' text-bg-secondary'"
                                            th:text="${subMenu.isActive == 'Y'} ? 'Active' : 'Inactive'"></span>
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/admin/submenus/{id}/edit(id=${subMenu.subMenuId})}">Edit</a>
                                        <form class="d-inline"
                                            th:action="@{/admin/submenus/{id}/delete(id=${subMenu.subMenuId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('Delete this submenu?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${subMenus.totalPages > 1}"
                        th:with="middleStart=${subMenus.number - 2 > 1 ? subMenus.number - 2 : 1},
                                 middleEnd=${subMenus.number + 2 < subMenus.totalPages - 2 ? subMenus.number + 2 : subMenus.totalPages - 2},
                                 showingFrom=${subMenus.totalElements == 0 ? 0 : subMenus.number * subMenus.size + 1},
                                 showingTo=${subMenus.totalElements == 0 ? 0 : subMenus.number * subMenus.size + subMenus.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${subMenus.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${subMenus.number + 1}">1</span> of <span th:text="${subMenus.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="Submenu management pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${subMenus.first} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/submenus(page=${subMenus.number - 1},size=${subMenus.size})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${subMenus.number == 0} ? ' active'">
                                    <a class="page-link" th:href="@{/admin/submenus(page=0,size=${subMenus.size})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == subMenus.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/admin/submenus(page=${pageIndex},size=${subMenus.size})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < subMenus.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${subMenus.totalPages > 1}"
                                    th:classappend="${subMenus.number == subMenus.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/admin/submenus(page=${subMenus.totalPages - 1},size=${subMenus.size})}"
                                        th:text="${subMenus.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${subMenus.last} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/submenus(page=${subMenus.number + 1},size=${subMenus.size})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
