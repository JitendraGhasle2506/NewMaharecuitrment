<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Role' : 'Create Role'">Role Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Roles', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Role' : 'Create Role'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${roleForm}"
                        th:action="${isEdit} ? @{/admin/roles/{id}(id=${roleId})} : @{/admin/roles}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Role Name</label>
                            <input type="text" th:field="*{name}" class="form-control" maxlength="100" autocomplete="off">
                            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update' : 'Save'"></button>
                            <a class="btn btn-outline-secondary" th:href="@{/admin/roles}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
