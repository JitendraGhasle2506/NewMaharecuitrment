<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Roles</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Admin', 'Roles', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Role Management</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/admin/roles/new}">Add Role</a>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/roles}">Roles</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/users}">Users</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/role-menu-mappings}">Role Menu Mapping</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/menus}">Menus</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/admin/submenus}">Submenus</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Role Name</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${roles.isEmpty()}">
                                    <td colspan="3" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="role : ${roles.content}">
                                    <td th:text="${role.id}"></td>
                                    <td th:text="${role.name}"></td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/admin/roles/{id}/edit(id=${role.id})}">Edit</a>
                                        <form class="d-inline"
                                            th:action="@{/admin/roles/{id}/delete(id=${role.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                                onclick="return confirm('Delete this role?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${roles.totalPages > 1}"
                        th:with="middleStart=${roles.number - 2 > 1 ? roles.number - 2 : 1},
                                 middleEnd=${roles.number + 2 < roles.totalPages - 2 ? roles.number + 2 : roles.totalPages - 2},
                                 showingFrom=${roles.totalElements == 0 ? 0 : roles.number * roles.size + 1},
                                 showingTo=${roles.totalElements == 0 ? 0 : roles.number * roles.size + roles.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${roles.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${roles.number + 1}">1</span> of <span th:text="${roles.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="Role management pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${roles.first} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/roles(page=${roles.number - 1},size=${roles.size})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${roles.number == 0} ? ' active'">
                                    <a class="page-link" th:href="@{/admin/roles(page=0,size=${roles.size})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == roles.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/admin/roles(page=${pageIndex},size=${roles.size})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < roles.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${roles.totalPages > 1}"
                                    th:classappend="${roles.number == roles.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/admin/roles(page=${roles.totalPages - 1},size=${roles.size})}"
                                        th:text="${roles.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${roles.last} ? ' disabled'">
                                    <a class="page-link" th:href="@{/admin/roles(page=${roles.number + 1},size=${roles.size})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
