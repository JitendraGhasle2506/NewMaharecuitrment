<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Personal Details</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>

    <th:block th:replace="~{header/header :: var-sidebar-header('Home', ${title}, ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${title}">Personal Details</h2>
                </div>
                <div class="card-body">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <div class="module-card h-100 text-center">
                                <img th:src="@{/images/profile-placeholder.jpg}" alt="Profile Picture"
                                    class="rounded-circle mb-3" width="110" height="110">
                                <h5 class="fw-semibold mb-1">John Doe</h5>
                                <p class="text-muted mb-1">Emp ID: 12345</p>
                                <p class="text-muted">Department: Finance</p>
                                <a href="#" class="btn btn-primary btn-sm">Edit Profile</a>
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="module-card h-100">
                                <h5 class="mb-3">Basic Information</h5>
                                <div class="table-responsive">
                                    <table class="table table-bordered mb-0">
                                        <tbody>
                                            <tr>
                                                <th width="30%">Full Name</th>
                                                <td>John Doe</td>
                                            </tr>
                                            <tr>
                                                <th>Mobile</th>
                                                <td>9876543210</td>
                                            </tr>
                                            <tr>
                                                <th>Email</th>
                                                <td>john.doe@company.com</td>
                                            </tr>
                                            <tr>
                                                <th>Date of Birth</th>
                                                <td>01-Jan-1990</td>
                                            </tr>
                                            <tr>
                                                <th>Gender</th>
                                                <td>Male</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </th:block>

</body>

</html>
