<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Employee Approval Details</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Approval Details', 'Attendance', ~{::section})}">
        <section>


            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2 th:if="${not #lists.isEmpty(pendingRequests)}" class="mb-0">
                        Pending Requests for <span th:text="${pendingRequests[0].employeeName}"></span>
                    </h2>
                    <h2 th:if="${#lists.isEmpty(pendingRequests)}" class="mb-0">No Pending Requests</h2>
                    <a th:href="@{/hod1/manual-attendance(roleType=${currentRoleType})}" class="btn btn-sm btn-outline-secondary">
                        <i class="fa fa-arrow-left"></i> Back to Summary
                    </a>
                </div>

                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <div class="table-responsive mt-3">
                        <table class="table table-bordered table-striped align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>In Time</th>
                                    <th>Out Time</th>
                                    <th>Reason</th>
                                    <th>Manager</th>
                                    <th style="width: 150px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${pendingRequests}">
                                    <td th:text="${#temporals.format(req.attendanceDate, 'dd-MM-yyyy')}"></td>
                                    <td th:text="${req.inTime}"></td>
                                    <td th:text="${req.outTime}"></td>
                                    <td th:text="${req.reason}"></td>
                                    <td th:text="${req.managerName}">-</td>
                                    <td>
                                        <form th:action="@{/hod1/manual-attendance/action}" method="post" class="d-inline">
                                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <input type="hidden" name="requestId" th:value="${req.id}">
                                            <input type="hidden" name="userId" th:value="${targetUserId}">
                                            <input type="hidden" name="roleType" th:value="${currentRoleType}">
                                            <input type="hidden" name="status" value="APPROVED">
                                            <input type="hidden" name="comments" value="Approved">
                                            <button type="submit" class="btn btn-sm btn-success me-1" title="Approve"><i class="fa fa-check"></i></button>
                                        </form>
                                        <button class="btn btn-sm btn-outline-danger" title="Reject" data-bs-toggle="modal" th:data-bs-target="'#rejectModal' + ${req.id}">
                                            <i class="fa fa-times"></i>
                                        </button>

                                        <!-- Simple Reject Modal for Comments -->
                                        <div class="modal fade" th:id="'rejectModal' + ${req.id}" tabindex="-1" aria-hidden="true">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <form th:action="@{/hod1/manual-attendance/action}" method="post">
                                                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                        <input type="hidden" name="requestId" th:value="${req.id}">
                                                        <input type="hidden" name="userId" th:value="${targetUserId}">
                                                        <input type="hidden" name="roleType" th:value="${currentRoleType}">
                                                        <input type="hidden" name="status" value="REJECTED">
                                                        <div class="modal-header">
                                                            <h5 class="modal-title">Reject Request</h5>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <div class="mb-3">
                                                                <label class="form-label">Reason for Rejection</label>
                                                                <textarea name="comments" class="form-control" required placeholder="Enter rejection reason..."></textarea>
                                                            </div>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                            <button type="submit" class="btn btn-danger">Reject</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>
</html>
