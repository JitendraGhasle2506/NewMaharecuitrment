<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Leave | Attendance System</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-dark: linear-gradient(180deg, #1f4f78, #163a59);
            --primary-accent: #17252a;
            --button-bg: #1f4f78;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --input-focus: #1f4f78;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #2d3436;
        }

        .leave-form-card {
            max-width: 95%;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: none;
            overflow: hidden;
            background: var(--glass-bg);
        }

        .card-header-premium {
            background: var(--primary-dark);
            padding: 20px 30px;
            position: relative;
        }

        .card-header-premium h4 {
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }

        .card-header-premium .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .card-header-premium .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-3px);
            color: #fff;
        }

        .leave-form-card .card-body {
            padding: 40px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 8px;
        }

        .required-star {
            color: #e74c3c;
        }

        .input-group {
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        .input-group-text {
            background-color: #f8f9fa;
            border: none;
            color: #1f4f78;
            padding-left: 15px;
            padding-right: 15px;
        }

        .form-control, .form-select {
            border: none;
            padding: 12px 15px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: none;
        }

        .info-tip {
            font-size: 0.8rem;
            color: #888;
            margin-top: 6px;
            font-style: italic;
        }

        .btn-submit-leave {
            background: var(--primary-dark);
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s ease;
        }

        .btn-submit-leave:hover {
            background: #17252a;
            transform: translateY(-2px);
            color: #fff;
        }

        .card-footer-note {
            background-color: rgba(102, 126, 234, 0.05);
            border-top: 1px solid rgba(102, 126, 234, 0.1);
            padding: 20px 30px;
        }

        .note-icon {
            background: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            color: #1f4f78;
        }

        /* Datepicker custom styling */
        .datepicker {
            border-radius: 12px !important;
            padding: 10px !important;
        }
    </style>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Apply Leave', 'Employee Corner', ~{::section})}">
        <section>
            <div class="container-fluid pb-5">
                <div class="card leave-form-card">
                    <div class="card-header-premium d-flex justify-content-between align-items-center">
                        <h4 class="mb-0"><i class="fa fa-calendar-plus me-3"></i>Apply for Leave</h4>
                        <a th:href="@{/employee/attendance-module}" class="btn btn-back">
                            <i class="fa fa-arrow-left me-2"></i>Back
                        </a>
                    </div>
                    
                    <div class="card-body">
                        <!-- Messages -->
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4 border-0 shadow-sm" style="border-left: 5px solid #2ecc71 !important;">
                            <i class="fa fa-check-circle me-2"></i><span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4 border-0 shadow-sm" style="border-left: 5px solid #e74c3c !important;">
                            <i class="fa fa-exclamation-triangle me-2"></i><span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form th:action="@{/employee/submitLeave}" th:object="${leaveApplication}" method="post">
                            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            
                            <div class="row g-4">
                                <!-- Leave Type -->
                                <div class="col-md-6">
                                    <label for="leaveType" class="form-label">Leave Type <span class="required-star">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa fa-tag"></i></span>
                                        <select class="form-select" th:field="*{leaveType}" id="leaveType" required>
                                            <option value="">- Select Leave Type -</option>
                                            <option th:each="leave : ${leaveTypes}" th:value="${leave.leaveCode}" th:text="${leave.leaveName}"></option>
                                        </select>
                                    </div>
                                    <div class="info-tip">Select the type of leave (CL, EL, etc.)</div>
                                </div>

                                <!-- Leave Category -->
                                <div class="col-md-6">
                                    <label for="leaveCategory" class="form-label">Leave Category <span class="required-star">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa fa-layer-group"></i></span>
                                        <select class="form-select" th:field="*{leaveCategory}" id="leaveCategory" required>
                                            <option value="">- Select Category -</option>
                                            <option value="Full Day">Full Day</option>
                                            <option value="First Half">First Half</option>
                                            <option value="Second Half">Second Half</option>
                                        </select>
                                    </div>
                                    <div class="info-tip">Full day or half day application</div>
                                </div>

                                <!-- Start Date -->
                                <div class="col-md-6">
                                    <label for="startDate" class="form-label">Start Date <span class="required-star">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa fa-calendar-alt"></i></span>
                                        <input type="text" class="form-control datepicker" th:field="*{startDate}" id="startDate" 
                                               placeholder="YYYY-MM-DD" required autocomplete="off">
                                    </div>
                                </div>

                                <!-- End Date -->
                                <div class="col-md-6">
                                    <label for="endDate" class="form-label">End Date <span class="required-star">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fa fa-calendar-check"></i></span>
                                        <input type="text" class="form-control datepicker" th:field="*{endDate}" id="endDate" 
                                               placeholder="YYYY-MM-DD" required autocomplete="off">
                                    </div>
                                </div>

                                <!-- Description -->
                                <div class="col-12">
                                    <label for="description" class="form-label">Reason / Description</label>
                                    <div class="input-group">
                                        <span class="input-group-text pt-2 align-items-start"><i class="fa fa-comment-dots mt-1"></i></span>
                                        <textarea class="form-control" th:field="*{description}" id="description" 
                                                  rows="4" placeholder="Briefly describe the reason for your leave..."></textarea>
                                    </div>
                                </div>

                                <div class="col-12 mt-5 text-center">
                                    <button type="submit" class="btn btn-submit-leave">
                                        <i class="fa fa-paper-plane me-2"></i>Send Leave Application
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="card-footer-note">
                        <div class="d-flex align-items-center">
                            <div class="note-icon me-3">
                                <i class="fa fa-info"></i>
                            </div>
                            <div class="text-muted" style="font-size: 0.85rem;">
                                <span class="fw-bold text-dark">Important Note:</span> Approved leave records will be automatically reflected in your 
                                attendance register. Ensure all details are correct before submitting.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </th:block>

    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js}"></script>
    
    <script>
        $(document).ready(function(){
            $('.datepicker').datepicker({
                format: "yyyy-mm-dd",
                autoclose: true,
                todayHighlight: true,
                clearBtn: true,
                templates: {
                    leftArrow: '<i class="fa fa-angle-left"></i>',
                    rightArrow: '<i class="fa fa-angle-right"></i>'
                }
            });
            
            // Validate End Date >= Start Date
            $('form').on('submit', function(e) {
                var start = $('#startDate').val();
                var end = $('#endDate').val();
                if (start && end && start > end) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: 'End Date must be greater than or equal to Start Date!',
                        confirmButtonColor: '#764ba2'
                    });
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
