<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Holiday Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
    <style>
        .form-card {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 30px;
            background: #fff;
            max-width: 600px;
            margin: 0 auto;
        }
        .btn-save {
            background-color: #00bfa5;
            color: #fff;
        }
        .btn-save:hover {
            color: #fff;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{header/header :: var-sidebar-header(${pageTitle}, 'Holiday Master', ~{::section})}">
        <section>
            <div class="page-main-content">
                <ul class="breadcrumb breadcrumb-style" style="background: none; padding: 0;">
                    <li class="breadcrumb-item"><i class="fa fa-home"></i> Home</li>
                    <li class="breadcrumb-item">Holiday Master</li>
                    <li class="breadcrumb-item active" th:text="${pageTitle}">Form</li>
                </ul>

                <div class="form-card">
                    <h5 class="mb-4" th:text="${pageTitle}">Add/Edit Holiday</h5>
                    
                    <form th:action="@{/hr/holidays/save}" th:object="${holiday}" method="post">
                        <!-- CSRF Token -->
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        
                        <!-- ID for Edit -->
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="holidayDate" class="form-label">Holiday Date</label>
                            <input type="date" class="form-control" id="holidayDate" th:field="*{holidayDate}" required>
                        </div>

                        <div class="mb-3">
                            <label for="holidayName" class="form-label">Holiday Name</label>
                            <input type="text" class="form-control" id="holidayName" th:field="*{holidayName}" placeholder="Enter holiday name" required>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/hr/holidays}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-save">
                                <i class="fa fa-save me-1"></i> Save Holiday
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>
</html>
