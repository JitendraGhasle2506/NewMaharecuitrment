<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Onboarded Employees</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
    <style>
        .employee-table-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .employee-table-card .header {
            padding: 1.5rem 2rem;
            background: #fff;
            border-bottom: 1px solid #edf2f7;
            border-radius: 12px 12px 0 0;
        }

        .status-badge {
            padding: 0.35em 0.8em;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 6px;
        }

        .status-active {
            background-color: #e6fffa;
            color: #2c7a7b;
        }

        .employee-avatar {
            width: 36px;
            height: 36px;
            background: #f7fafc;
            border: 1px solid #edf2f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #4a5568;
        }
    </style>
</head>

<body class="hr-shell">

    <th:block th:replace="~{header/header :: var-sidebar-header('Home', 'Employees', ~{::section})}">
        <section>
            <div class="card employee-table-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0">Onboarded Employees</h2>
                        <p class="text-muted mb-0">List of all formal employees onboarded through the portal.</p>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div th:if="${successMessage}" class="alert alert-success m-3" th:text="${successMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Employee Information</th>
                                    <th>Employee Code</th>
                                    <th>Department</th>
                                    <th>Designation</th>
                                    <th>Joining Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="emp : ${employees}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <div class="employee-avatar me-3"
                                                th:text="${#strings.substring(emp.fullName, 0, 1)}">E</div>
                                            <div>
                                                <div class="fw-bold" th:text="${emp.fullName}">Full Name</div>
                                                <small class="text-muted" th:text="${emp.email}">email@domain.com</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge bg-secondary-subtle text-secondary-emphasis"
                                            th:text="${emp.employeeCode}">EMP001</span>
                                    </td>
                                    <td th:text="${emp.department}">Department</td>
                                    <td th:text="${emp.designation}">Designation</td>
                                    <td th:text="${#temporals.format(emp.joiningDate, 'dd-MM-yyyy')}">01-01-2024</td>
                                    <td>
                                        <span class="status-badge status-active" th:text="${emp.status}">ACTIVE</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(employees)}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        No onboarded employees found.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>

</body>

</html>
