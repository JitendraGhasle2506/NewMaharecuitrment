<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Resource Level' : 'Create Resource Level'">Resource Level Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Resource Levels', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Resource Level' : 'Create Resource Level'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                    </div>

                    <form th:object="${resourceLevelForm}"
                        th:action="${isEdit} ? @{/master/resource-levels/{id}(id=${levelId})} : @{/master/resource-levels}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Level Code</label>
                            <input type="text" th:field="*{levelCode}" class="form-control" maxlength="10">
                            <div class="text-danger small" th:if="${#fields.hasErrors('levelCode')}" th:errors="*{levelCode}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Level Name</label>
                            <input type="text" th:field="*{levelName}" class="form-control" maxlength="50">
                            <div class="text-danger small" th:if="${#fields.hasErrors('levelName')}" th:errors="*{levelName}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Min Experience</label>
                            <input type="number" th:field="*{minExperience}" class="form-control" step="0.01" min="0">
                            <div class="text-danger small" th:if="${#fields.hasErrors('minExperience')}" th:errors="*{minExperience}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Max Experience</label>
                            <input type="number" th:field="*{maxExperience}" class="form-control" step="0.01" min="0">
                            <div class="text-danger small" th:if="${#fields.hasErrors('maxExperience')}" th:errors="*{maxExperience}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{activeFlag}">
                                <option value="Y">Active</option>
                                <option value="N">Inactive</option>
                            </select>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update' : 'Save'"></button>
                            <a th:href="@{/master/resource-levels}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
