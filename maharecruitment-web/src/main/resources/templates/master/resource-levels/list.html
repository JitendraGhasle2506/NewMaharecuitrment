<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Resource Levels</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Resource Levels', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Resource Level Experience Master</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/master/resource-levels/new}">Add Resource Level</a>
                </div>

                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/projects}">Projects</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form class="row g-2 mb-3" method="get" th:action="@{/master/resource-levels}">
                        <div class="col-auto form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="includeInactive" name="includeInactive"
                                value="true" th:checked="${includeInactive}">
                            <label class="form-check-label" for="includeInactive">Include inactive</label>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-secondary btn-sm" type="submit">Apply</button>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Level Code</th>
                                    <th>Level Name</th>
                                    <th>Min Exp</th>
                                    <th>Max Exp</th>
                                    <th>Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${levels.isEmpty()}">
                                    <td colspan="7" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="item : ${levels.content}">
                                    <td th:text="${item.levelId}"></td>
                                    <td th:text="${item.levelCode}"></td>
                                    <td th:text="${item.levelName}"></td>
                                    <td th:text="${item.minExperience}"></td>
                                    <td th:text="${item.maxExperience}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${item.activeFlag == 'Y'} ? ' text-bg-success' : ' text-bg-secondary'"
                                            th:text="${item.activeFlag == 'Y'} ? 'Active' : 'Inactive'"></span>
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/master/resource-levels/{id}/edit(id=${item.levelId})}">Edit</a>
                                        <form th:if="${item.activeFlag == 'Y'}" class="d-inline"
                                            th:action="@{/master/resource-levels/{id}/delete(id=${item.levelId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                                        </form>
                                        <form th:if="${item.activeFlag != 'Y'}" class="d-inline"
                                            th:action="@{/master/resource-levels/{id}/restore(id=${item.levelId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button class="btn btn-outline-success btn-sm" type="submit">Restore</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${levels.totalPages > 1}"
                        th:with="middleStart=${levels.number - 2 > 1 ? levels.number - 2 : 1},
                                 middleEnd=${levels.number + 2 < levels.totalPages - 2 ? levels.number + 2 : levels.totalPages - 2},
                                 showingFrom=${levels.totalElements == 0 ? 0 : levels.number * levels.size + 1},
                                 showingTo=${levels.totalElements == 0 ? 0 : levels.number * levels.size + levels.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${levels.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${levels.number + 1}">1</span> of <span th:text="${levels.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="Resource level pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${levels.first} ? ' disabled'">
                                    <a class="page-link"
                                        th:href="@{/master/resource-levels(page=${levels.number - 1},size=${levels.size},includeInactive=${includeInactive})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${levels.number == 0} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/master/resource-levels(page=0,size=${levels.size},includeInactive=${includeInactive})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == levels.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/master/resource-levels(page=${pageIndex},size=${levels.size},includeInactive=${includeInactive})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < levels.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${levels.totalPages > 1}"
                                    th:classappend="${levels.number == levels.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/master/resource-levels(page=${levels.totalPages - 1},size=${levels.size},includeInactive=${includeInactive})}"
                                        th:text="${levels.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${levels.last} ? ' disabled'">
                                    <a class="page-link"
                                        th:href="@{/master/resource-levels(page=${levels.number + 1},size=${levels.size},includeInactive=${includeInactive})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
