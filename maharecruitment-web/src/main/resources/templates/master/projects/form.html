<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Project' : 'Create Project'">Project Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Projects', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Project' : 'Create Project'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/projects}">Projects</a>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:object="${projectForm}"
                        th:action="${isEdit} ? @{/master/projects/{id}(id=${projectId})} : @{/master/projects}"
                        method="post"
                        class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Project Name <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{projectName}" class="form-control" maxlength="100">
                            <div class="text-danger small" th:if="${#fields.hasErrors('projectName')}" th:errors="*{projectName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Project Type <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{projectType}">
                                <option value="">Select Project Type</option>
                                <option th:each="type : ${projectTypes}" th:value="${type}" th:text="${#strings.replace(type.name(), '_', ' ')}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('projectType')}" th:errors="*{projectType}"></div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Project Description</label>
                            <textarea th:field="*{projectDesc}" class="form-control" maxlength="100" rows="3"></textarea>
                            <div class="text-danger small" th:if="${#fields.hasErrors('projectDesc')}" th:errors="*{projectDesc}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Department Registration ID</label>
                            <input type="number" min="1" th:field="*{departmentRegistrationId}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('departmentRegistrationId')}"
                                th:errors="*{departmentRegistrationId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Application ID</label>
                            <input type="number" min="1" th:field="*{applicationId}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('applicationId')}" th:errors="*{applicationId}"></div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update' : 'Save'"></button>
                            <a th:href="@{/master/projects}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
