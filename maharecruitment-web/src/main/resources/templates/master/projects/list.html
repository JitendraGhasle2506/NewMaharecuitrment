<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Projects', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Project Master</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/master/projects/new}">Add Project</a>
                </div>

                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/projects}">Projects</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Project Name</th>
                                    <th>Project Description</th>
                                    <th>Project Type</th>
                                    <th>Department Registration ID</th>
                                    <th>Application ID</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${projects.isEmpty()}">
                                    <td colspan="7" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="item : ${projects.content}">
                                    <td th:text="${item.projectId}"></td>
                                    <td th:text="${item.projectName}"></td>
                                    <td th:text="${item.projectDesc != null ? item.projectDesc : '-'}"></td>
                                    <td th:text="${#strings.replace(item.projectType.name(), '_', ' ')}"></td>
                                    <td th:text="${item.departmentRegistrationId != null ? item.departmentRegistrationId : '-'}"></td>
                                    <td th:text="${item.applicationId != null ? item.applicationId : '-'}"></td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/master/projects/{id}/edit(id=${item.projectId})}">Edit</a>
                                        <form class="d-inline"
                                            th:action="@{/master/projects/{id}/delete(id=${item.projectId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3" th:if="${projects.totalPages > 1}">
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!projects.first}"
                            th:href="@{/master/projects(page=${projects.number - 1},size=${projects.size})}">
                            Previous
                        </a>
                        <span th:if="${projects.first}"></span>
                        <span class="small text-muted">
                            Page <span th:text="${projects.number + 1}"></span> of <span th:text="${projects.totalPages}"></span>
                        </span>
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!projects.last}"
                            th:href="@{/master/projects(page=${projects.number + 1},size=${projects.size})}">
                            Next
                        </a>
                        <span th:if="${projects.last}"></span>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
