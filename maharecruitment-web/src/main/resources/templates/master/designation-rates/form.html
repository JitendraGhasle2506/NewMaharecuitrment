<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Designation Rate' : 'Create Designation Rate'">Designation Rate Form</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Designation Rates', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2 th:text="${isEdit} ? 'Edit Designation Rate' : 'Create Designation Rate'"></h2>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                    </div>

                    <form th:object="${designationRateForm}"
                        th:action="${isEdit} ? @{/master/designation-rates/{id}(id=${rateId})} : @{/master/designation-rates}"
                        method="post" class="row g-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="col-md-6">
                            <label class="form-label">Designation</label>
                            <select id="designationSelect"
                                class="form-select"
                                th:field="*{designationId}"
                                th:attr="data-levels-base-url=@{/master/designation-rates/designations}">
                                <option value="">Select designation</option>
                                <option th:each="d : ${availableDesignations}" th:value="${d.designationId}"
                                    th:text="${d.category + ' - ' + d.designationName}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('designationId')}"
                                th:errors="*{designationId}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Level Code</label>
                            <select id="levelCodeSelect" class="form-select" th:field="*{levelCode}">
                                <option value="">Select level</option>
                                <option th:each="l : ${availableLevels}" th:value="${l.levelCode}"
                                    th:text="${l.levelCode + ' - ' + l.levelName}"></option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('levelCode')}" th:errors="*{levelCode}"></div>
                            <div class="text-danger small" id="levelLoadMessage"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Gross Monthly CTC</label>
                            <input type="number" th:field="*{grossMonthlyCtc}" class="form-control" step="0.01" min="0.01">
                            <div class="text-danger small" th:if="${#fields.hasErrors('grossMonthlyCtc')}"
                                th:errors="*{grossMonthlyCtc}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Effective From</label>
                            <input type="date" th:field="*{effectiveFrom}" class="form-control">
                            <div class="text-danger small" th:if="${#fields.hasErrors('effectiveFrom')}"
                                th:errors="*{effectiveFrom}"></div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Effective To</label>
                            <input type="date" th:field="*{effectiveTo}" class="form-control">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{activeFlag}">
                                <option value="Y">Active</option>
                                <option value="N">Inactive</option>
                            </select>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update' : 'Save'"></button>
                            <a th:href="@{/master/designation-rates}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </th:block>
    <script th:src="@{/js/master-designation-rate-form.js}"></script>
</body>

</html>
