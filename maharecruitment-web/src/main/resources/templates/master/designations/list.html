<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Designations</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Master', 'Designations', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>Manpower Designation Master</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/master/designations/new}">Add Designation</a>
                </div>

                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/resource-levels}">Resource Levels</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/master/designations}">Designations</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/designation-rates}">Designation Rates</a>
                        <a class="btn btn-outline-secondary btn-sm" th:href="@{/master/projects}">Projects</a>
                    </div>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form class="row g-2 mb-3" method="get" th:action="@{/master/designations}">
                        <div class="col-auto form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="includeInactive" name="includeInactive"
                                value="true" th:checked="${includeInactive}">
                            <label class="form-check-label" for="includeInactive">Include inactive</label>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-secondary btn-sm" type="submit">Apply</button>
                        </div>
                    </form>
<div class="row g-2 mb-3">
    <div class="col-auto">
        <input type="text" class="form-control" placeholder="Search..." id="searchInput" />
    </div>
</div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Category</th>
                                    <th>Designation Name</th>
                                    <th>Role</th>
                                    <th>Levels</th>
                                    <th>Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${designations.isEmpty()}">
                                    <td colspan="7" class="text-center text-muted">No records found</td>
                                </tr>
                                <tr th:each="item : ${designations.content}">
                                    <td th:text="${item.designationId}"></td>
                                    <td th:text="${item.category}"></td>
                                    <td th:text="${item.designationName}"></td>
                                    <td th:text="${item.roleName}"></td>
                                    <td>
                                        <span th:if="${item.levels == null or item.levels.isEmpty()}" class="text-muted">-</span>
                                        <span th:each="level : ${item.levels}" class="badge text-bg-light border me-1 mb-1"
                                            th:text="${level.levelCode}"></span>
                                    </td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${item.activeFlag == 'Y'} ? ' text-bg-success' : ' text-bg-secondary'"
                                            th:text="${item.activeFlag == 'Y'} ? 'Active' : 'Inactive'"></span>
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/master/designations/{id}/edit(id=${item.designationId})}">Edit</a>
                                        <form th:if="${item.activeFlag == 'Y'}" class="d-inline"
                                            th:action="@{/master/designations/{id}/delete(id=${item.designationId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                                        </form>
                                        <form th:if="${item.activeFlag != 'Y'}" class="d-inline"
                                            th:action="@{/master/designations/{id}/restore(id=${item.designationId})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button class="btn btn-outline-success btn-sm" type="submit">Restore</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3" th:if="${designations.totalPages > 1}">
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!designations.first}"
                            th:href="@{/master/designations(page=${designations.number - 1},size=${designations.size},includeInactive=${includeInactive})}">
                            Previous
                        </a>
                        <span th:if="${designations.first}"></span>
                        <span class="small text-muted">
                            Page <span th:text="${designations.number + 1}"></span> of <span th:text="${designations.totalPages}"></span>
                        </span>
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!designations.last}"
                            th:href="@{/master/designations(page=${designations.number + 1},size=${designations.size},includeInactive=${includeInactive})}">
                            Next
                        </a>
                        <span th:if="${designations.last}"></span>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
<script>
    document.getElementById('searchInput').addEventListener('input', function() {
        var filter = this.value.toLowerCase();
        var rows = document.querySelectorAll('table tbody tr');
        rows.forEach(function(row) {
            var text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
</script>
</body>

</html>
