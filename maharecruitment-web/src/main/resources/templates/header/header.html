<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:fragment="var-files-header">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/app-shell.css}">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    </th:block>
</head>

<body>

    <th:block th:fragment="var-sidebar-header(pageTitle, menuTitle, content)">
        <div class="wrapper app-shell" id="appShell">
            <nav id="sidebar" class="app-sidebar">
                <div class="sidebar-header">
                    <div class="profile">
                        <img th:src="@{/img/mahait_logo.png}" alt="MahaIT Logo" class="img-fluid">
                        <div class="profile-caption mt-2 text-light fw-semibold">MahaIT Recruitment</div>
                    </div>
                </div>

                <p class="sidebar-section-title">Navigation</p>

                <ul class="list-unstyled components">
                    <li class="active">
                        <a th:href="${homePageUrl}">
                            <i class="fa fa-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <li th:if="${session.menus != null}" th:each="menuItem : ${session.menus}" class="menu-item">
                        <a th:href="${menuItem.isSubMenu == 0 ? '#' :
                                     (menuItem.url != null ?
                                     (menuItem.url.startsWith('/') ? contextPath + menuItem.url : contextPath + '/' + menuItem.url)
                                     : '#')}"
                            th:classappend="${menuItem.isSubMenu == 0} ? 'toggle-submenu' : ''"
                            th:attr="data-target=${'submenu-' + menuItem.menuId}">
                            <i th:class="${menuItem.icon}"></i>
                            <span th:text="${menuItem.menuNameEnglish}"></span>
                            <i th:if="${menuItem.isSubMenu == 0}" class="fa fa-caret-down"></i>
                        </a>

                        <ul class="list-unstyled submenu" th:id="${'submenu-' + menuItem.menuId}"
                            th:if="${menuItem.isSubMenu == 0 and session.submenus != null}">
                            <li th:each="subItem : ${session.submenus}" th:if="${subItem.menu.menuId == menuItem.menuId}">
                                <a th:href="${subItem.url != null ?
                                             (subItem.url.startsWith('/') ? contextPath + subItem.url : contextPath + '/' + subItem.url)
                                             : '#'}">
                                    <i th:class="${subItem.icon}"></i>
                                    <span th:text="${subItem.subMenuNameEnglish}"></span>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li th:if="${session.menus == null || #lists.isEmpty(session.menus)}"
                        th:each="item : ${sidebarItems}">
                        <a th:href="${item.url}">
                            <i th:class="${item.iconClass}"></i>
                            <span th:text="${item.label}"></span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div id="content" class="app-content">
                <nav class="navbar navbar-expand-lg app-topbar">
                    <div class="container-fluid">
                        <button type="button" id="sidebarCollapse" class="btn app-nav-toggle" aria-label="Toggle sidebar">
                            <i class="fas fa-align-left"></i>
                        </button>

                        <h3 class="logo-text">MahaIT Recruitment</h3>

                        <ul class="nav navbar-nav ms-auto align-items-center gap-2">
                            <li class="nav-item dropdown" th:if="${session.SESSION_USER != null}">
                                <a class="nav-link dropdown-toggle user-profile-chip" href="#" id="navbarDropdown" role="button"
                                    data-bs-toggle="dropdown" aria-expanded="false">
                                    <span class="user-avatar">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <span class="user-info-text">
                                        <span class="user-name" th:text="${session.SESSION_USER.name}">User</span>
                                        <span class="user-role-label" th:text="${primaryRoleLabel}">Role</span>
                                    </span>
                                </a>

                                <div class="dropdown-menu dropdown-menu-end profile-dropdown-menu" aria-labelledby="navbarDropdown">
                                    <div class="dropdown-header">
                                        <div class="fw-semibold" th:text="${session.SESSION_USER.name}">User Name</div>
                                        <small class="text-muted" th:text="${session.SESSION_USER.email}">email@domain.com</small>
                                    </div>
                                    <div class="dropdown-divider"></div>
                                    <form th:action="@{/logout}" method="post" class="px-3 py-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-danger btn-sm w-100">
                                            <i class="fas fa-sign-out-alt me-1"></i> Logout
                                        </button>
                                    </form>
                                </div>
                            </li>

                            <li class="nav-item" th:if="${session.SESSION_USER == null}">
                                <a class="nav-link text-light" th:href="@{/login}">
                                    <i class="fas fa-sign-in-alt me-1"></i> Login
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <div class="page-main-content">
                    <ul class="breadcrumb breadcrumb-style">
                        <li class="breadcrumb-item">
                            <h4 class="page-title" th:text="${pageTitle != null ? pageTitle : 'Home'}">Home</h4>
                        </li>
                        <li class="breadcrumb-item active" th:text="${menuTitle != null ? menuTitle : 'Dashboard'}">Menu Name</li>
                    </ul>

                    <div class="page-contents">
                        <th:block th:replace="${content}"></th:block>
                    </div>
                </div>
            </div>
        </div>

        <script>
            (() => {
                const appShell = document.getElementById('appShell');
                const sidebarToggle = document.getElementById('sidebarCollapse');

                if (appShell && sidebarToggle) {
                    sidebarToggle.addEventListener('click', () => {
                        if (window.innerWidth < 992) {
                            appShell.classList.toggle('mobile-sidebar-open');
                            return;
                        }
                        appShell.classList.toggle('sidebar-collapsed');
                    });
                }

                document.querySelectorAll('.toggle-submenu').forEach((toggleLink) => {
                    toggleLink.addEventListener('click', (event) => {
                        event.preventDefault();
                        const targetId = toggleLink.dataset.target;
                        if (!targetId) {
                            return;
                        }

                        const submenu = document.getElementById(targetId);
                        if (!submenu) {
                            return;
                        }

                        submenu.classList.toggle('open');
                        toggleLink.classList.toggle('expanded');
                    });
                });
            })();
        </script>
    </th:block>

</body>

</html>
