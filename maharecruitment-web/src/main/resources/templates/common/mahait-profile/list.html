<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>MahaIT Profile Master</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Masters', 'MahaIT Profile Master', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2>MahaIT Profile Master</h2>
                    <a class="btn btn-primary btn-sm" th:href="@{/common/mahait-profile/new}">Add Profile</a>
                </div>

                <div class="card-body">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="row g-2 mb-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" id="searchInput"
                                placeholder="Search by profile, company, CIN, PAN, GST or bank">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle" id="profileTable">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Profile</th>
                                    <th>Company</th>
                                    <th>CIN</th>
                                    <th>PAN</th>
                                    <th>GST</th>
                                    <th>Bank</th>
                                    <th>Status</th>
                                    <th>Updated Info</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${profiles.isEmpty()}">
                                    <td colspan="10" class="text-center text-muted">No MahaIT profile records found</td>
                                </tr>
                                <tr th:each="item : ${profiles.content}">
                                    <td th:text="${item.mahaItProfileId}"></td>
                                    <td th:text="${item.profileName}"></td>
                                    <td th:text="${item.companyName}"></td>
                                    <td th:text="${item.cinNumber}"></td>
                                    <td th:text="${item.panNumber}"></td>
                                    <td th:text="${item.gstNumber}"></td>
                                    <td th:text="${item.bankName}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${item.active} ? ' text-bg-success' : ' text-bg-secondary'"
                                            th:text="${item.active ? 'Active' : 'Inactive'}"></span>
                                    </td>
                                    <td>
                                        <div class="small fw-semibold" th:text="${item.updatedBy != null ? item.updatedBy : '-'}"></div>
                                        <div class="small text-muted"
                                            th:text="${item.updatedDate != null ? #temporals.format(item.updatedDate, 'dd MMM yyyy, hh:mm a') : '-'}"></div>
                                    </td>
                                    <td class="text-center">
                                        <a class="btn btn-outline-primary btn-sm"
                                            th:href="@{/common/mahait-profile/{id}/edit(id=${item.mahaItProfileId})}">Edit</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="app-pagination-shell"
                        th:if="${profiles.totalPages > 1}"
                        th:with="middleStart=${profiles.number - 2 > 1 ? profiles.number - 2 : 1},
                                 middleEnd=${profiles.number + 2 < profiles.totalPages - 2 ? profiles.number + 2 : profiles.totalPages - 2},
                                 showingFrom=${profiles.totalElements == 0 ? 0 : profiles.number * profiles.size + 1},
                                 showingTo=${profiles.totalElements == 0 ? 0 : profiles.number * profiles.size + profiles.numberOfElements}">
                        <div class="app-pagination-summary">
                            <div class="app-pagination-meta">
                                Showing <span th:text="${showingFrom}">1</span> to <span th:text="${showingTo}">10</span> of
                                <span th:text="${profiles.totalElements}">10</span> entries
                            </div>
                            <div class="app-pagination-meta">
                                Page <span th:text="${profiles.number + 1}">1</span> of <span th:text="${profiles.totalPages}">1</span>
                            </div>
                        </div>
                        <nav aria-label="MahaIT profile pagination">
                            <ul class="pagination app-pagination mb-0">
                                <li class="page-item" th:classappend="${profiles.first} ? ' disabled'">
                                    <a class="page-link" th:href="@{/common/mahait-profile(page=${profiles.number - 1},size=${profiles.size})}">Previous</a>
                                </li>
                                <li class="page-item" th:classappend="${profiles.number == 0} ? ' active'">
                                    <a class="page-link" th:href="@{/common/mahait-profile(page=0,size=${profiles.size})}">1</a>
                                </li>
                                <li class="page-item disabled" th:if="${middleStart > 1}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <th:block th:if="${middleStart <= middleEnd}">
                                    <li class="page-item" th:each="pageIndex : ${#numbers.sequence(middleStart, middleEnd)}"
                                        th:classappend="${pageIndex == profiles.number} ? ' active'">
                                        <a class="page-link"
                                            th:href="@{/common/mahait-profile(page=${pageIndex},size=${profiles.size})}"
                                            th:text="${pageIndex + 1}">2</a>
                                    </li>
                                </th:block>
                                <li class="page-item disabled" th:if="${middleEnd < profiles.totalPages - 2}">
                                    <span class="page-link app-pagination-ellipsis">...</span>
                                </li>
                                <li class="page-item" th:if="${profiles.totalPages > 1}"
                                    th:classappend="${profiles.number == profiles.totalPages - 1} ? ' active'">
                                    <a class="page-link"
                                        th:href="@{/common/mahait-profile(page=${profiles.totalPages - 1},size=${profiles.size})}"
                                        th:text="${profiles.totalPages}">2</a>
                                </li>
                                <li class="page-item" th:classappend="${profiles.last} ? ' disabled'">
                                    <a class="page-link" th:href="@{/common/mahait-profile(page=${profiles.number + 1},size=${profiles.size})}">Next</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </section>
    </th:block>

    <script>
        document.getElementById('searchInput').addEventListener('input', function () {
            const filter = this.value.toLowerCase();
            document.querySelectorAll('#profileTable tbody tr').forEach(function (row) {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(filter) ? '' : 'none';
            });
        });
    </script>
</body>

</html>
