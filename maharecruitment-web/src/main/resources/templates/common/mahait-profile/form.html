<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit MahaIT Profile' : 'Create MahaIT Profile'">MahaIT Profile</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
    <style>
        .section-header {
            background-color: #f8f9fa;
            padding: 10px 15px;
            border-left: 5px solid #0d6efd;
            margin-top: 25px;
            margin-bottom: 20px;
            font-weight: 700;
            border-radius: 0 4px 4px 0;
        }

        .required-asterisk {
            color: red;
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>

<body>
    <th:block th:replace="~{header/header :: var-sidebar-header('Masters', 'MahaIT Profile Master', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header d-flex justify-content-between align-items-center">
                    <h2 th:text="${isEdit} ? 'Edit MahaIT Profile' : 'Create MahaIT Profile'">MahaIT Profile</h2>
                    <a th:href="@{/common/mahait-profile}" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Back to List
                    </a>
                </div>

                <div class="card-body p-4">
                    <div class="row g-3 mb-4" th:if="${profile != null}">
                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <div class="small text-muted">Created By</div>
                                <div class="fw-semibold" th:text="${profile.createdBy != null ? profile.createdBy : '-'}"></div>
                                <div class="small text-muted mt-2"
                                    th:text="${profile.createdDate != null ? #temporals.format(profile.createdDate, 'dd MMM yyyy, hh:mm a') : '-'}"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <div class="small text-muted">Last Updated By</div>
                                <div class="fw-semibold" th:text="${profile.updatedBy != null ? profile.updatedBy : '-'}"></div>
                                <div class="small text-muted mt-2"
                                    th:text="${profile.updatedDate != null ? #temporals.format(profile.updatedDate, 'dd MMM yyyy, hh:mm a') : '-'}"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 h-100">
                                <div class="small text-muted">Current Status</div>
                                <span class="badge mt-1"
                                    th:classappend="${profile.active} ? ' text-bg-success' : ' text-bg-secondary'"
                                    th:text="${profile.active ? 'Active' : 'Inactive'}"></span>
                                <div class="small text-muted mt-2">Access is limited to Admin and HR roles.</div>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form id="profileForm" th:object="${profileForm}"
                        th:action="${isEdit} ? @{/common/mahait-profile/{id}(id=${profileId})} : @{/common/mahait-profile}"
                        method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{mahaItProfileId}">

                        <div class="section-header">1. Profile Setup</div>

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Profile Name <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{profileName}" maxlength="150">
                                <div class="text-danger small" th:if="${#fields.hasErrors('profileName')}"
                                    th:errors="*{profileName}"></div>
                            </div>

                            <div class="col-md-4 d-flex align-items-end">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="active">
                                    <label class="form-check-label" for="active">Active</label>
                                </div>
                            </div>
                        </div>

                        <div class="section-header">2. Company Details</div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Company Name <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{companyName}" maxlength="200">
                                <div class="text-danger small" th:if="${#fields.hasErrors('companyName')}"
                                    th:errors="*{companyName}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">CIN Number <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control text-uppercase" th:field="*{cinNumber}" maxlength="21">
                                <div class="text-danger small" th:if="${#fields.hasErrors('cinNumber')}"
                                    th:errors="*{cinNumber}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">PAN Number <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control text-uppercase" th:field="*{panNumber}" maxlength="10">
                                <div class="text-danger small" th:if="${#fields.hasErrors('panNumber')}"
                                    th:errors="*{panNumber}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">GST Number <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control text-uppercase" th:field="*{gstNumber}" maxlength="15">
                                <div class="text-danger small" th:if="${#fields.hasErrors('gstNumber')}"
                                    th:errors="*{gstNumber}"></div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label">Company Address <span class="required-asterisk">*</span></label>
                                <textarea class="form-control" rows="4" th:field="*{companyAddress}"
                                    maxlength="1000"></textarea>
                                <div class="text-danger small" th:if="${#fields.hasErrors('companyAddress')}"
                                    th:errors="*{companyAddress}"></div>
                            </div>
                        </div>

                        <div class="section-header">3. Bank Account Details</div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Bank Name <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{bankName}" maxlength="150">
                                <div class="text-danger small" th:if="${#fields.hasErrors('bankName')}"
                                    th:errors="*{bankName}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Branch Name <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{branchName}" maxlength="150">
                                <div class="text-danger small" th:if="${#fields.hasErrors('branchName')}"
                                    th:errors="*{branchName}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Account Holder Name <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{accountHolderName}" maxlength="150">
                                <div class="text-danger small" th:if="${#fields.hasErrors('accountHolderName')}"
                                    th:errors="*{accountHolderName}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Account Number <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control" th:field="*{accountNumber}" maxlength="30">
                                <div class="text-danger small" th:if="${#fields.hasErrors('accountNumber')}"
                                    th:errors="*{accountNumber}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">IFSC Code <span class="required-asterisk">*</span></label>
                                <input type="text" class="form-control text-uppercase" th:field="*{ifscCode}" maxlength="11">
                                <div class="text-danger small" th:if="${#fields.hasErrors('ifscCode')}"
                                    th:errors="*{ifscCode}"></div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/common/mahait-profile}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary"
                                th:text="${isEdit} ? 'Update Profile' : 'Save Profile'">Save Profile</button>
                        </div>
                    </form>

                    <div class="section-header">4. Audit Trail</div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Action</th>
                                    <th>Actor</th>
                                    <th>Timestamp</th>
                                    <th>Details</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${auditLogs.isEmpty()}">
                                    <td colspan="4" class="text-center text-muted">No audit entries found</td>
                                </tr>
                                <tr th:each="log : ${auditLogs}">
                                    <td th:text="${log.actionType}"></td>
                                    <td>
                                        <div class="fw-semibold" th:text="${log.actorUsername}"></div>
                                        <div class="small text-muted" th:text="${log.actorUserId != null ? 'User ID: ' + log.actorUserId : 'User ID: -'}"></div>
                                    </td>
                                    <td th:text="${log.actionTimestamp != null ? #temporals.format(log.actionTimestamp, 'dd MMM yyyy, hh:mm a') : '-'}"></td>
                                    <td style="white-space: pre-wrap;" th:text="${log.details}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </th:block>
</body>

</html>
