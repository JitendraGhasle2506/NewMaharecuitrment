<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Common Module</title>
    <th:block th:replace="~{header/header :: var-files-header}"></th:block>
</head>

<body>

    <th:block th:replace="~{header/header :: var-sidebar-header('Home', 'Common Module', ~{::section})}">
        <section>
            <div class="card add-emp-card">
                <div class="header">
                    <h2>Common Module</h2>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4" th:text="${message}">Welcome to Common Module</p>

                    <div class="module-grid">
                        <article class="module-card">
                            <div class="module-icon"><i class="fa fa-users"></i></div>
                            <h5>User Management</h5>
                            <p class="text-muted mb-0">Add, edit, and manage system users.</p>
                        </article>

                        <article class="module-card">
                            <div class="module-icon"><i class="fa fa-shield-halved"></i></div>
                            <h5>Role Permissions</h5>
                            <p class="text-muted mb-0">Manage role based permissions and access policies.</p>
                        </article>

                        <article class="module-card">
                            <div class="module-icon"><i class="fa fa-gear"></i></div>
                            <h5>System Settings</h5>
                            <p class="text-muted mb-0">Maintain application configuration and defaults.</p>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </th:block>

</body>

</html>
