spring.datasource.url=jdbc:postgresql://localhost:5432/maharecruitment
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.show-sql=true
logging.level.root=DEBUG
logging.level.com.maharecruitment.gov.in=DEBUG
logging.level.com.project=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
logging.file.path=${MAHARECRUITMENT_LOG_PATH:${user.home}/maharecruitment/logs/local}
app.security.cookie.secure=false
server.servlet.session.cookie.secure=${app.security.cookie.secure}

# Local test mode: skip OTP checks for department registration.
registration.department.otp-bypass-enabled=true
notification.sms.enabled=false
notification.email.enabled=false
